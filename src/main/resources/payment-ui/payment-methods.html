<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Select Payment Method</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;

            background:linear-gradient(135deg,#4f46e5,#6366f1,#9333ea);
        }

        .container{

            background:white;
            padding:50px;
            border-radius:16px;
            width:420px;

            box-shadow:
                0 20px 40px rgba(0,0,0,0.15);

            text-align:center;
        }

        h1{
            margin-top:0;
            margin-bottom:10px;
            font-size:28px;
        }

        .subtitle{
            color:#666;
            margin-bottom:30px;
        }

        .providers{

            display:flex;
            flex-direction:column;
            gap:12px;

        }

        .provider{

            border:1px solid #e5e7eb;
            border-radius:12px;
            padding:16px;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:16px;
            font-weight:600;

            background:white;

            cursor:pointer;

            transition:all .2s ease;
        }

        .provider:hover{

            transform:translateY(-2px);

            border-color:#6366f1;

            box-shadow:
                0 6px 20px rgba(0,0,0,0.1);
        }

        .footer{

            margin-top:30px;
            font-size:13px;
            color:#888;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Select Payment Method</h1>
    <div class="subtitle">
        Choose how you want to pay
    </div>

    <div id="providers" class="providers"></div>

    <div class="footer">
        Secure payment powered by your payment provider
    </div>

</div>

<script>

    fetch("/payment/providers")
    .then(r => r.json())
    .then(providers => {

        const container = document.getElementById("providers");

        providers.forEach(p => {

            const div = document.createElement("div");

            div.className = "provider";

            div.innerText = "Pay with " + formatName(p);

            div.onclick = () => {
                window.location = "/payment/" + p;
            };

            container.appendChild(div);

        });

    });

    function formatName(name){

        return name
            .toLowerCase()
            .replace("_"," ")
            .replace(/\b\w/g,l=>l.toUpperCase());

    }

</script>

</body>
</html>
